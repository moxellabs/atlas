name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Tests
        run: bun test
      - name: Distribution smoke
        run: bun run smoke:distribution
      - name: Production onboarding UAT
        run: bun run uat:production
      - name: Release readiness dry run
        run: bun tooling/scripts/verify.ts
      - name: Public artifact verification
        run: bun apps/cli/src/index.ts artifact verify
