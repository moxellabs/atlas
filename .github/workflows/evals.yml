name: Evals

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: evals-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install
        run: bun install --frozen-lockfile
      - name: Run eval report
        run: bun run eval:ci
      - name: Prepare dashboard entrypoint
        if: always()
        shell: bash
        run: |
          if [[ -f /tmp/atlas-eval-report/mcp-retrieval-report.html ]]; then
            cp /tmp/atlas-eval-report/mcp-retrieval-report.html /tmp/atlas-eval-report/index.html
          fi
      - name: Upload eval report artifact
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: atlas-eval-reports
          path: /tmp/atlas-eval-report
          if-no-files-found: error
      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: /tmp/atlas-eval-report

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: report
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy eval dashboard to Pages
        id: deployment
        uses: actions/deploy-pages@v4
