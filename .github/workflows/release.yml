name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, e.g. v1.0.0 or v1.0.0-rc.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.channel.outputs.version }}
      npm-dist-tag: ${{ steps.channel.outputs.npm-dist-tag }}
      github-prerelease: ${{ steps.channel.outputs.github-prerelease }}
      tag: ${{ steps.channel.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install
        run: bun install --frozen-lockfile
      - name: Resolve release channel
        id: channel
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          if [[ -z "$TAG" ]]; then
            echo "Release tag missing" >&2
            exit 1
          fi
          TAG_COMMIT=$(git rev-list -n1 "$TAG")
          HEAD_COMMIT=$(git rev-parse HEAD)
          if [[ "$HEAD_COMMIT" != "$TAG_COMMIT" ]]; then
            echo "Checked out $HEAD_COMMIT but $TAG points to $TAG_COMMIT" >&2
            exit 1
          fi
          bun tooling/scripts/release.ts --channel --tag="$TAG" | tee release-channel.env
          VERSION=$(grep '^VERSION=' release-channel.env | cut -d= -f2-)
          NPM_DIST_TAG=$(grep '^NPM_DIST_TAG=' release-channel.env | cut -d= -f2-)
          GITHUB_PRERELEASE=$(grep '^GITHUB_PRERELEASE=' release-channel.env | cut -d= -f2-)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "npm-dist-tag=$NPM_DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "github-prerelease=$GITHUB_PRERELEASE" >> "$GITHUB_OUTPUT"
      - name: Typecheck
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Tests
        run: bun test
      - name: Distribution smoke
        run: bun run smoke:distribution
      - name: Release readiness dry run
        run: bun tooling/scripts/verify.ts
      - name: Public artifact verification
        run: bun apps/cli/src/index.ts artifact verify

  publish:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.validate.outputs.tag }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Install
        run: bun install --frozen-lockfile
      - name: Pack release tarball
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          npm pack --json > pack-output.txt
          TARBALL=$(bun -e 'const text=await Bun.file("pack-output.txt").text(); const start=text.indexOf("["); const input=JSON.parse(start >= 0 ? text.slice(start) : text); console.log(input[0].filename)')
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
      - name: Smoke packed tarball
        shell: bash
        run: |
          set -euo pipefail
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          cd "$tmpdir"
          bun init -y
          bun add "${{ github.workspace }}/${{ steps.pack.outputs.tarball }}"
          bun node_modules/.bin/atlas --help
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_DIST_TAG: ${{ needs.validate.outputs.npm-dist-tag }}
        run: npm publish "${{ steps.pack.outputs.tarball }}" --access public --tag "$NPM_DIST_TAG"
      - name: Generate SHA256 checksums
        shell: bash
        run: |
          set -euo pipefail
          sha256sum "${{ steps.pack.outputs.tarball }}" > release-sha256.txt
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: Atlas ${{ needs.validate.outputs.tag }}
          prerelease: ${{ needs.validate.outputs.github-prerelease }}
          generate_release_notes: true
          files: |
            ${{ steps.pack.outputs.tarball }}
            release-sha256.txt
