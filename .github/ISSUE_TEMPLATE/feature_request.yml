name: Feature request
description: Suggest an Atlas improvement
title: "feat: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Do not include credentials, tokens, private hostnames, proprietary docs, customer data, or vulnerability details.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need or workflow gap should Atlas solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Atlas version or commit
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: OS
    validations:
      required: false
  - type: input
    id: bun
    attributes:
      label: Bun version
    validations:
      required: false
