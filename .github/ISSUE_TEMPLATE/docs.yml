name: Documentation issue
description: Report missing, stale, or confusing Atlas docs
title: "docs: "
labels: [documentation]
body:
  - type: markdown
    attributes:
      value: |
        Do not include credentials, tokens, private hostnames, proprietary docs, customer data, or vulnerability details.
  - type: input
    id: page
    attributes:
      label: Page or file
      placeholder: "README.md, docs/security.md, etc."
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is wrong or missing?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected documentation
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Atlas version or commit
    validations:
      required: false
