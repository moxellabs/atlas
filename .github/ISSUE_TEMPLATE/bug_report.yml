name: Bug report
description: Report a reproducible Atlas bug
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include credentials, tokens, private keys, private hostnames, proprietary docs, or customer data. For vulnerabilities, stop and follow SECURITY.md instead of opening a public issue.
  - type: input
    id: version
    attributes:
      label: Atlas version or commit
      placeholder: "commit SHA or release version"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15, Ubuntu 24.04, etc."
    validations:
      required: true
  - type: input
    id: bun
    attributes:
      label: Bun version
      placeholder: "bun --version"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command or workflow
      description: Use sanitized placeholders. Do not paste secrets.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: Redact paths, hostnames, and sensitive data.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Provide sanitized steps or a small public fixture.
    validations:
      required: true
